name: CI Pipeline

# TRIGGER: Run this workflow on...
on:
  push:
    branches: [ main, develop ]   # any push to main or develop
  pull_request:
    branches: [ main ]             # any PR targeting main

# JOBS: what to actually do
jobs:
  
  # ── Job 1: lint ─────────────────────────────────────────
  lint:
    name: Lint code
    runs-on: ubuntu-latest         # GitHub-hosted runner
    
    steps:
      # Step 1: Get the code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4  # official action from GitHub
      
      # Step 2: Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
                    
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci                # ci = clean install, faster than npm install
      
      # Step 4: Run linter
      - name: Run ESLint
        run: npm run lint

  # ── Job 2: test ─────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: lint                    # only run if lint passes!
    
    strategy:
      matrix:
        node-version: [18, 20]     # run tests on TWO Node versions simultaneously
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
      
      # Step 5: Upload test results as artifact
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()               # upload even if tests fail
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: coverage/
